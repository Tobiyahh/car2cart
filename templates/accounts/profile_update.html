{% extends 'base.html' %}
{% block title %}Edit Profile | Car2Cart{% endblock %}
{% block content %}
<section class="py-24">
  <div class="mx-auto max-w-xl px-4 sm:px-6 lg:px-8">
    <div class="glow-card rounded-[2rem] border border-slate-800 p-10">
      <h1 class="text-3xl font-bold text-white">Update profile</h1>
      <form method="post" class="mt-8 space-y-6">
        {% csrf_token %}
        {% for field in form.visible_fields %}
        <div>
          <label class="mb-2 block text-sm font-medium text-slate-300">{{ field.label }}</label>
          {{ field }}
          {{ field.errors }}
        </div>
        {% endfor %}
        <button type="submit" class="btn-primary w-full rounded-full px-5 py-3 text-sm font-semibold text-slate-950">Save changes</button>
      </form>
    </div>
  </div>
</section>
{% endblock %}
