{% extends 'base.html' %}
{% block title %}Edit Profile | Car2Cart{% endblock %}
{% block content %}
<section class="bg-white py-24">
  <div class="mx-auto max-w-3xl px-4 sm:px-6 lg:px-8">
    <div class="rounded-lg border border-gray-200 bg-white p-8 shadow-sm">
      <h1 class="text-3xl font-bold text-gray-950">Update Profile</h1>
      <form method="post" class="mt-8 grid gap-6 sm:grid-cols-2">
        {% csrf_token %}
        {% for field in form.visible_fields %}
        <div class="{% if field.name == 'address' %}sm:col-span-2{% endif %}">
          <label class="mb-2 block text-sm font-medium text-gray-700">{{ field.label }}</label>
          {{ field }}
          {{ field.errors }}
        </div>
        {% endfor %}
        <button type="submit" class="btn-primary rounded-full px-5 py-3 text-sm font-semibold text-gray-950 sm:col-span-2">Save changes</button>
      </form>
    </div>
  </div>
</section>
{% endblock %}
