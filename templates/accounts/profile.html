{% extends 'base.html' %}
{% block title %}My Profile | Car2Cart{% endblock %}
{% block content %}
<section class="py-24">
  <div class="mx-auto max-w-4xl px-4 sm:px-6 lg:px-8">
    <div class="glow-card rounded-[2rem] border border-slate-800 p-10">
      <h1 class="text-3xl font-bold text-white">Your Profile</h1>
      <p class="mt-3 text-slate-400">Manage your account, billing preferences, and collectible tastes.</p>
      <div class="mt-8 space-y-6">
        <div class="grid gap-4 sm:grid-cols-2">
          <div class="rounded-3xl border border-slate-800 bg-slate-900 p-6">
            <p class="text-sm uppercase tracking-[0.2em] text-orange-400">Username</p>
            <p class="mt-2 text-white">{{ user.username }}</p>
          </div>
          <div class="rounded-3xl border border-slate-800 bg-slate-900 p-6">
            <p class="text-sm uppercase tracking-[0.2em] text-orange-400">Email</p>
            <p class="mt-2 text-white">{{ user.email }}</p>
          </div>
        </div>
        <a href="{% url 'accounts:profile_edit' %}" class="btn-primary inline-flex rounded-full px-5 py-3 text-sm font-semibold text-slate-950">Edit Profile</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
