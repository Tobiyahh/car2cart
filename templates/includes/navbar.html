{% load static %}
<header class="sticky top-0 z-50 border-b border-gray-200 bg-white/95 shadow-sm backdrop-blur-xl">
  <div class="mx-auto max-w-7xl px-4 py-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between gap-4">
      <a href="{% url 'core:home' %}" class="flex items-center gap-3 transition hover:opacity-85" aria-label="Car2Cart Home">
        <img src="{% static 'images/logo.jpeg' %}" alt="Car2Cart logo" class="h-12 w-12 rounded-md object-cover">
        <span class="text-2xl font-semibold tracking-tight">
          <span class="text-black">Car</span><span class="text-red-600">2</span><span class="text-black">Cart</span>
        </span>
      </a>

      <nav class="hidden items-center gap-1 md:flex" aria-label="Main navigation">
        <a href="{% url 'core:home' %}" class="rounded-lg px-4 py-2 text-sm font-medium text-gray-700 transition hover:bg-gray-100 hover:text-gray-950">Home</a>
        <a href="{% url 'products:list' %}" class="rounded-lg px-4 py-2 text-sm font-medium text-gray-700 transition hover:bg-gray-100 hover:text-gray-950">Shop</a>
        <a href="{% url 'core:about' %}" class="rounded-lg px-4 py-2 text-sm font-medium text-gray-700 transition hover:bg-gray-100 hover:text-gray-950">About</a>
        <a href="{% url 'support:contact' %}" class="rounded-lg px-4 py-2 text-sm font-medium text-gray-700 transition hover:bg-gray-100 hover:text-gray-950">Contact</a>
      </nav>

      <form action="{% url 'products:list' %}" method="get" class="hidden flex-1 lg:flex lg:max-w-md">
        <label class="relative w-full">
          <span class="sr-only">Search products</span>
          <input name="q" type="search" placeholder="Search products..." class="w-full rounded-full border border-gray-300 px-4 py-2 text-sm text-gray-900 outline-none transition focus:border-transparent focus:ring-2 focus:ring-gray-900">
        </label>
      </form>

      <div class="flex items-center gap-2 sm:gap-3">
        <a href="{% url 'cart:detail' %}" class="rounded-md border border-gray-200 px-3 py-2 text-sm font-medium text-gray-700 transition hover:bg-gray-100 hover:text-gray-950">Cart</a>
        {% if user.is_authenticated %}
        {% if user.is_staff %}
        <a href="{% url 'admin:index' %}" class="hidden rounded-md px-3 py-2 text-sm font-medium text-gray-700 transition hover:bg-gray-100 sm:inline-flex">Admin</a>
        {% endif %}
        <a href="{% url 'accounts:profile' %}" class="hidden rounded-md px-3 py-2 text-sm font-medium text-gray-700 transition hover:bg-gray-100 sm:inline-flex">Profile</a>
        <form action="{% url 'accounts:logout' %}" method="post" class="m-0">
          {% csrf_token %}
          <button type="submit" class="rounded-md bg-gray-950 px-4 py-2 text-sm font-medium text-white transition hover:bg-gray-800">Logout</button>
        </form>
        {% else %}
        <a href="{% url 'accounts:login' %}" class="hidden rounded-md px-3 py-2 text-sm font-medium text-gray-700 transition hover:bg-gray-100 sm:inline-flex">Sign In</a>
        <a href="{% url 'accounts:register' %}" class="rounded-md bg-gray-950 px-4 py-2 text-sm font-medium text-white transition hover:bg-gray-800">Sign Up</a>
        {% endif %}
      </div>
    </div>

    <nav class="mt-4 flex items-center gap-2 overflow-x-auto border-t border-gray-100 pt-4 md:hidden" aria-label="Mobile navigation">
      <a href="{% url 'core:home' %}" class="rounded-lg px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100">Home</a>
      <a href="{% url 'products:list' %}" class="rounded-lg px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100">Shop</a>
      <a href="{% url 'core:about' %}" class="rounded-lg px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100">About</a>
      <a href="{% url 'support:contact' %}" class="rounded-lg px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100">Contact</a>
    </nav>
  </div>
</header>
